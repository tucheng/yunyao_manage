<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云窑后台管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f3f0; color: #333; }
.header { background: #2c3e50; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 16px; position: relative; }
.header h1 { font-size: 18px; }
.header .nav { margin-left: auto; }
.nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.menu-group { position: relative; }
.menu-cat-btn {
  background: none; border: 1px solid transparent; color: #bdc3c7;
  padding: 6px 12px; border-radius: 6px; font-size: 14px; cursor: pointer;
  white-space: nowrap; user-select: none;
}
.menu-cat-btn:hover, .menu-cat-btn.open { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.15); }
.cat-dropdown {
  position: absolute; top: 100%; right: 0; min-width: 140px;
  background: #fff; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  padding: 4px 0; z-index: 999; display: none; overflow: hidden;
}
.cat-dropdown.show { display: block; }
.cat-dropdown a {
  display: block; padding: 10px 16px; font-size: 14px;
  color: #333; text-decoration: none; cursor: pointer; transition: background .15s;
}
.cat-dropdown a:hover { background: #f0edea; }
.cat-dropdown a.active { background: #e8e4df; color: #2c3e50; font-weight: 600; }
.container { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
.login-card h2 { margin-bottom: 20px; }
.login-card input { width: 280px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
.stats { display: flex; gap: 12px; flex-wrap: wrap; }
.stat-card { background: #fff; border-radius: 10px; padding: 20px 28px; flex: 1; min-width: 140px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.stat-card .num { font-size: 32px; font-weight: 700; color: #2c3e50; }
.stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
.card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card h2 { font-size: 16px; margin-bottom: 12px; color: #2c3e50; }
.card h3 { font-size: 15px; margin-bottom: 8px; color: #2c3e50; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
th { background: #fafafa; font-weight: 600; color: #555; font-size: 13px; white-space: nowrap; }
td { vertical-align: middle; }
tr:hover { background: #fafafa; }
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 12px; font-size: 14px; color: #888; }
.search-bar { display: flex; gap: 8px; margin-bottom: 14px; }
.search-bar input { flex: 1; max-width: 300px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px;
}
.form-group textarea { resize: vertical; min-height: 60px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 14px; cursor: pointer; }
.btn-primary { background: #2c3e50; color: #fff; border-color: #2c3e50; }
.btn-primary:hover { background: #34495e; }
.btn-danger { background: #e74c3c; color: #fff; border-color: #e74c3c; }
.btn-danger:hover { background: #c0392b; }
.btn-sm { padding: 5px 10px; font-size: 13px; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.badge-admin { background: #2c3e50; color: #fff; }
.badge-neutral { background: #e8e4df; color: #555; }
.badge-overseas { background: #f39c12; color: #fff; }
.tag-muted { font-size: 13px; color: #e74c3c; }
.help { font-size: 12px; color: #999; margin-top: 3px; line-height: 1.5; }
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.config-toolbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.config-table td { vertical-align: top; }
.config-table textarea { width: 100%; font-size: 13px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; resize: vertical; min-height: 32px; }
.config-table input { width: 100%; font-size: 13px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; }
.config-table input.narrow { width: 80px; }
.tip { cursor: help; color: #3498db; font-size: 12px; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-content { background: #fff; border-radius: 12px; padding: 24px; max-width: 560px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-content h3 { margin-bottom: 16px; }
.toast { display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 2000; color: #fff; }
.toast.success { background: #27ae60; }
.toast.error { background: #e74c3c; }
/* 作品属性 */
.attr-tab { padding: 8px 16px; border: none; background: transparent; font-size: 14px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; }
.attr-tab-active { color: #2c3e50; font-weight: 600; border-bottom-color: #2c3e50; }
.attr-tab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.attr-batch-add { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
.attr-batch-add textarea { flex: 1; min-height: 48px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; resize: vertical; }
.attr-list { display: flex; flex-direction: column; gap: 4px; }
.attr-item { display: flex; align-items: center; gap: 6px; background: #fafafa; border-radius: 6px; padding: 4px 8px; }
.attr-item:hover { background: #f0edea; }
.attr-drag-handle { cursor: grab; color: #bbb; font-size: 18px; line-height: 1; user-select: none; }
.attr-item.dragging { opacity: .5; }
.attr-item-input { flex: 1; border: 1px solid transparent; background: transparent; padding: 5px 6px; border-radius: 4px; font-size: 13px; outline: none; }
.attr-item-input:focus { border-color: #ccc; background: #fff; }
</style>
</head>
<body>
<div id="loginPage" class="login-page">
  <div class="login-card">
    <h2>🔐 云窑后台管理</h2>
    <input type="text" id="usernameInput" placeholder="用户名" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('passwordInput').focus()">
    <input type="password" id="passwordInput" placeholder="密码" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
    <p id="loginError" style="color:#e74c3c;font-size:13px;margin-top:8px;display:none"></p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="header">
    <h1>☁️ 云窑后台</h1>
    <div class="nav">
      <div class="menu-group">
        <button class="menu-cat-btn" data-menu="user" onclick="toggleCatMenu('user')">用户管理 ▾</button>
        <div class="cat-dropdown" id="cat-user">
          <a onclick="switchTab('users')">用户管理</a>
          <a onclick="switchTab('levels')">等级管理</a>
          <a onclick="switchTab('redeem')">兑换码管理</a>
        </div>
      </div>
      <div class="menu-group">
        <button class="menu-cat-btn" data-menu="yun" onclick="toggleCatMenu('yun')">云窑功能 ▾</button>
        <div class="cat-dropdown" id="cat-yun">
          <a class="active" onclick="switchTab('dashboard')">概览</a>
          <a onclick="switchTab('materials')">材料管理</a>
          <a onclick="switchTab('work-attributes')">作品属性</a>
          <a onclick="switchTab('temperature-config')">温度配置</a>
          <a onclick="switchTab('color-config')">颜色配置</a>
        </div>
      </div>
      <div class="menu-group">
        <button class="menu-cat-btn" data-menu="operation" onclick="toggleCatMenu('operation')">运营管理 ▾</button>
        <div class="cat-dropdown" id="cat-operation">
          <a onclick="switchTab('complaints')">投诉处理</a>
        </div>
      </div>
      <div class="menu-group">
        <button class="menu-cat-btn" data-menu="sys" onclick="toggleCatMenu('sys')">系统设置 ▾</button>
        <div class="cat-dropdown" id="cat-sys">
          <a onclick="switchTab('verification')">验证码配置</a>
        </div>
      </div>
    </div>
  </div>
  <div class="container">
    <div id="pageContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let TOKEN = sessionStorage.getItem('admin_token') || '';
localStorage.removeItem('admin_token');

function doLogin() {
  const username = document.getElementById('usernameInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = 'block'; return; }
  fetch('/admin/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({username, password}) })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail || '登录失败'); }); return r.json(); })
    .then(d => {
      TOKEN = d.token;
      sessionStorage.setItem('admin_token', TOKEN);
      showApp();
    })
    .catch(e => { TOKEN = ''; sessionStorage.removeItem('admin_token'); errEl.textContent = e.message; errEl.style.display = 'block'; });
}

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.querySelector('.header h1').textContent = '☁️ 云窑后台 · 概览';
  switchTab('dashboard');
}

// 刷新后自动恢复登录
if (TOKEN) {
  // 验证 token 是否有效
  fetch('/admin/stats', { headers: { Authorization: 'Bearer ' + TOKEN } })
    .then(r => { if (r.ok) { showApp(); } else { TOKEN = ''; sessionStorage.removeItem('admin_token'); } })
    .catch(() => { TOKEN = ''; sessionStorage.removeItem('admin_token'); });
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function api(path, opts={}) {
  return fetch(path, { ...opts, headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + TOKEN, ...opts.headers } })
    .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail || '请求失败'); }); return r.json(); });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return esc(String(s)).replace(/\"/g, '&quot;'); }

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

let modalContainer = null;
function showModal(contentHtml) {
  if (!modalContainer) {
    modalContainer = document.createElement('div');
    modalContainer.className = 'modal';
    modalContainer.innerHTML = '<div class="modal-content" style="max-width:700px"><div id="modalBody"></div><div style="margin-top:16px;text-align:right"><button class="btn" id="modalCloseBtn">关闭</button></div></div>';
    modalContainer.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('show'); });
    document.body.appendChild(modalContainer);
  }
  document.getElementById('modalBody').innerHTML = contentHtml;
  document.getElementById('modalCloseBtn').onclick = function() {
    modalContainer.classList.remove('show');
  };
  modalContainer.classList.add('show');
  modalContainer.id = 'subModal';
}

function toggleCatMenu(name) {
  const dropdown = document.getElementById('cat-' + name);
  const btn = document.querySelector(`[data-menu="${name}"]`);
  const isOpen = dropdown.classList.contains('show');
  document.querySelectorAll('.cat-dropdown').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.menu-cat-btn').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    dropdown.classList.add('show');
    btn.classList.add('open');
  }
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.menu-group')) {
    document.querySelectorAll('.cat-dropdown').forEach(d => d.classList.remove('show'));
    document.querySelectorAll('.menu-cat-btn').forEach(b => b.classList.remove('open'));
  }
});

function switchTab(name) {
  const allowedPages = new Set(['dashboard', 'users', 'levels', 'materials', 'redeem', 'complaints', 'verification', 'color-config', 'temperature-config', 'work-attributes']);
  if (!allowedPages.has(name)) return;
  // 更新导航状态
  document.querySelectorAll('.cat-dropdown a').forEach(a => a.classList.remove('active'));
  const activeLink = document.querySelector(`.cat-dropdown a[onclick*="${name}"]`);
  if (activeLink) activeLink.classList.add('active');
  const label = activeLink ? activeLink.textContent : name;
  document.querySelector('.header h1').textContent = '☁️ 云窑后台 · ' + label;
  // 收起菜单
  document.querySelectorAll('.cat-dropdown').forEach(d => d.classList.remove('show'));
  document.querySelectorAll('.menu-cat-btn').forEach(b => b.classList.remove('open'));

  // 加载页面
  const container = document.getElementById('pageContainer');
  container.innerHTML = '<div style="text-align:center;padding:40px;color:#999">加载中...</div>';

  fetch('/static/admin/' + name + '.html', { cache: 'no-store' })
  .then(r => { if (!r.ok) throw new Error('页面不存在'); return r.text(); })
  .then(html => {
    container.innerHTML = html;
    const previous = document.getElementById('adminPageScript');
    if (previous) previous.remove();
    const script = document.createElement('script');
    script.id = 'adminPageScript';
    script.src = '/static/admin/' + name + '.js';
    script.onerror = function() { toast('页面脚本加载失败', 'error'); };
    document.body.appendChild(script);
  }).catch(e => {
    container.textContent = '加载失败: ' + e.message;
    container.style.cssText = 'text-align:center;padding:40px;color:#e74c3c';
  });
}
</script>
</body>
</html>
