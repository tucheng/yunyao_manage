name: backend-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      mysql:
        image: mysql:8.4.10
        env:
          MYSQL_DATABASE: yunyao_ci
          MYSQL_USER: yunyao
          MYSQL_PASSWORD: yunyao_ci_password
          MYSQL_ROOT_PASSWORD: root_ci_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot_ci_password --silent"
          --health-interval=10s --health-timeout=5s --health-retries=12
      redis:
        image: redis:7.4.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" --health-interval=5s
          --health-timeout=3s --health-retries=12
    env:
      APP_ENV: test
      DATABASE_URL: mysql+pymysql://yunyao:yunyao_ci_password@127.0.0.1:3306/yunyao_ci?charset=utf8mb4
      AUTH_SECRET: ci-only-secret-that-is-at-least-32-bytes
      RATE_LIMIT_ENABLED: "1"
      REDIS_URL: redis://127.0.0.1:6379/0
      TEST_REDIS_URL: redis://127.0.0.1:6379/1
      LOG_TO_FILE: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip
      - run: python -m pip install --requirement requirements.lock --requirement requirements-ci.txt
      - name: Prepare migration database
        run: |
          alembic upgrade head
          python init_db.py
      - name: Unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Authorization matrix
        run: python -m unittest tests.test_authorization_matrix -v
      - name: Migration drift and rollback
        run: |
          alembic check
          alembic downgrade -1
          alembic upgrade head
      - name: Dependency audit
        run: pip-audit --requirement requirements.lock --strict
