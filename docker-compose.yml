name: yunyao

services:
  redis:
    image: redis:7.4.3-alpine
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=32m"]
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  db:
    image: mysql:8.4.10
    restart: unless-stopped
    cpus: 1.50
    mem_limit: 1536m
    pids_limit: 256
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
      - /var/run/mysqld:rw,nosuid,size=32m
    environment:
      MYSQL_DATABASE: yunyao
      MYSQL_USER: yunyao_app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 192
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    cpus: 0.25
    mem_limit: 128m
    pids_limit: 64
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
      - /root/.mc:rw,noexec,nosuid,size=16m
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${S3_ACCESS_KEY_ID}" "$${S3_SECRET_ACCESS_KEY}"; do sleep 2; done &&
        mc mb --ignore-existing "local/$${S3_BUCKET}" &&
        mc version enable "local/$${S3_BUCKET}" &&
        mc anonymous set download "local/$${S3_BUCKET}"
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-yunyao-uploads}
    restart: "no"

  api:
    image: ${API_IMAGE:-yunyao-api:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 256
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?set S3_PUBLIC_BASE_URL}
      LOG_TO_FILE: "0"
      REDIS_URL: redis://redis:6379/0
      FORWARDED_ALLOW_IPS: "172.16.0.0/12"
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-B", "-c", "import requests; requests.get('http://127.0.0.1:8000/health/ready', timeout=5).raise_for_status()"]
      interval: 15s
      timeout: 8s
      retries: 8

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    command: ["alembic upgrade head && python -B init_db.py"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  maintenance:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-B", "scripts/run_daily_maintenance.py"]
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["jobs"]
    restart: "no"

  mysql-backup:
    image: mysql:8.4.10
    profiles: ["backups"]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/opt/backup/mysql-backup.sh"]
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: yunyao
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./deploy/backup:/opt/backup:ro
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 96
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]

  object-backup:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    profiles: ["backups"]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/opt/backup/object-backup.sh"]
    environment:
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-yunyao-uploads}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./deploy/backup:/opt/backup:ro
      - backup_data:/backups
    depends_on:
      minio-init:
        condition: service_completed_successfully
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 96
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
      - /root/.mc:rw,noexec,nosuid,size=16m

  frontend:
    image: ${FRONTEND_IMAGE:-yunyao-frontend:local}
    build:
      context: ../yunyao_app
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=16m

  proxy:
    image: nginx:1.28.0-alpine
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 256m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=16m
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  mysql_data:
  minio_data:
  redis_data:
  backup_data:
