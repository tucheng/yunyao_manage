name: yunyao

secrets:
  smtp_password:
    file: ${SMTP_PASSWORD_SECRET_FILE:?set SMTP_PASSWORD_SECRET_FILE}
  initial_admin_password:
    file: ${INITIAL_ADMIN_PASSWORD_SECRET_FILE:?set INITIAL_ADMIN_PASSWORD_SECRET_FILE}

services:
  redis:
    image: redis:7.4.3-alpine
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 160m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=16m"]
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "96mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  db:
    image: mysql:8.4.10
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 640m
    pids_limit: 256
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
      - /var/run/mysqld:rw,nosuid,size=32m
    environment:
      MYSQL_DATABASE: yunyao
      MYSQL_USER: yunyao_app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/mysql-low-memory.cnf:/etc/mysql/conf.d/yunyao-low-memory.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    image: ${API_IMAGE:-yunyao-api:local}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 1.00
    mem_limit: 512m
    pids_limit: 256
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?set cloud S3-compatible endpoint}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?set S3_PUBLIC_BASE_URL}
      S3_PRIVATE_BUCKET: ${S3_PRIVATE_BUCKET:?set S3_PRIVATE_BUCKET}
      LOG_TO_FILE: "0"
      REDIS_URL: redis://redis:6379/0
      FORWARDED_ALLOW_IPS: "172.16.0.0/12"
    secrets:
      - smtp_password
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-B", "-c", "import requests; requests.get('http://127.0.0.1:8000/health/ready', timeout=5).raise_for_status()"]
      interval: 15s
      timeout: 8s
      retries: 8

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]
    command: ["alembic upgrade head && python -B init_db.py"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    secrets:
      - smtp_password
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  maintenance:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-B", "scripts/run_daily_maintenance.py"]
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    secrets:
      - smtp_password
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["jobs"]
    restart: "no"

  mysql-backup:
    image: mysql:8.4.10
    profiles: ["backups"]
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/opt/backup/mysql-backup.sh"]
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: yunyao
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./deploy/backup:/opt/backup:ro
      - backup_data:/backups
    depends_on:
      db:
        condition: service_healthy
    cpus: 0.50
    mem_limit: 384m
    pids_limit: 96
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]

  bootstrap-admin:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["python", "-B", "scripts/bootstrap_admin.py"]
    env_file:
      - .env.prod
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:?set INITIAL_ADMIN_USERNAME}
      INITIAL_ADMIN_PASSWORD_FILE: /run/secrets/initial_admin_password
    secrets:
      - smtp_password
      - initial_admin_password
    depends_on:
      migrate:
        condition: service_completed_successfully
    profiles: ["tools"]
    restart: "no"

  frontend:
    image: ${FRONTEND_IMAGE:-yunyao-frontend:local}
    build:
      context: ../yunyao_app
      dockerfile: Dockerfile
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 128m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=16m

  proxy:
    image: nginx:1.28.0-alpine
    restart: unless-stopped
    cpus: 0.50
    mem_limit: 128m
    pids_limit: 128
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs:
      - /var/cache/nginx:rw,noexec,nosuid,size=32m
      - /var/run:rw,noexec,nosuid,size=8m
      - /tmp:rw,noexec,nosuid,size=16m
    ports:
      - "${HTTP_BIND_IP:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${HTTPS_BIND_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_FILE:?set TLS_CERT_FILE}:/etc/nginx/tls/fullchain.pem:ro
      - ${TLS_KEY_FILE:?set TLS_KEY_FILE}:/etc/nginx/tls/privkey.pem:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  backup_data:
