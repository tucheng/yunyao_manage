events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    client_header_timeout 10s;
    client_body_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=20r/s;

    map $http_x_forwarded_proto $trusted_forwarded_proto {
        default $scheme;
        https https;
    }

    upstream api_backend {
        zone api_backend 64k;
        server api:8000 weight=9;
        server api-canary:8000 weight=1;
        keepalive 32;
    }
    upstream web_frontend { server frontend:80; keepalive 8; }
    upstream object_storage { server minio:9000; keepalive 8; }

    server {
        listen 80;
        client_max_body_size 10m;
        limit_conn per_ip_conn 20;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        if ($http_x_forwarded_proto = "http") { return 308 https://$host$request_uri; }

        location = / { return 302 /web/; }
        location /web/ {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $trusted_forwarded_proto;
        }
        location /media/ {
            proxy_pass http://object_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $trusted_forwarded_proto;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        location ~ ^/(auth|users|recipes|recipe-ingredients|works|materials|settings|notifications|social|complaints|favorites|glossary|temperature-cones|curves|redeem|ocr|upload|uploads|api|admin|admin-panel|static|health)(/|$) {
            limit_req zone=api_rate burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $trusted_forwarded_proto;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
        }
    }
}
