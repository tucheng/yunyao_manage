events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    upstream api_backend {
        server api:8000;
        keepalive 16;
    }

    upstream web_frontend {
        server frontend:80;
        keepalive 8;
    }

    upstream object_storage {
        server minio:9000;
        keepalive 8;
    }

    server {
        listen 80;
        client_max_body_size 10m;

        location = / {
            return 302 /web/;
        }

        location /web/ {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /media/ {
            proxy_pass http://object_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~ ^/(auth|users|recipes|recipe-ingredients|works|materials|settings|notifications|social|complaints|favorites|glossary|temperature-cones|curves|redeem|ocr|upload|uploads|api|admin|admin-panel|static|health)(/|$) {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
