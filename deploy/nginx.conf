events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    client_header_buffer_size 2k;
    large_client_header_buffers 4 8k;
    client_header_timeout 10s;
    client_body_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;
    limit_req_zone $binary_remote_addr zone=api_rate:10m rate=20r/s;

    upstream api_backend {
        server api:8000;
        keepalive 16;
    }

    upstream web_frontend {
        server frontend:80;
        keepalive 8;
    }

    upstream object_storage {
        server minio:9000;
        keepalive 8;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 308 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:TLS:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        client_max_body_size 10m;
        limit_conn per_ip_conn 20;

        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = / {
            return 302 /web/;
        }

        location /web/ {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Request-ID $request_id;
        }

        location /media/ {
            proxy_pass http://object_storage/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location ~ ^/(auth|users|recipes|recipe-ingredients|works|materials|settings|notifications|social|complaints|complaint-media|favorites|glossary|temperature-cones|curves|redeem|ocr|upload|uploads|api|admin|admin-panel|static|health)(/|$) {
            limit_req zone=api_rate burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Never append a client-supplied forwarding chain.  This proxy is
            # the public TLS boundary and is the sole authority for client IP.
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
        }
    }
}
