services:
  api-canary:
    image: ${CANARY_API_IMAGE:?set CANARY_API_IMAGE to an immutable tag or digest}
    restart: unless-stopped
    env_file: [.env.prod]
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:?set S3_PUBLIC_BASE_URL}
      LOG_TO_FILE: "0"
      REDIS_URL: redis://redis:6379/0
      FORWARDED_ALLOW_IPS: "172.16.0.0/12"
      RELEASE_COLOR: canary
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-B", "-c", "import requests; requests.get('http://127.0.0.1:8000/health/ready', timeout=5).raise_for_status()"]
      interval: 15s
      timeout: 8s
      retries: 8
    cpus: 1.00
    mem_limit: 768m
    pids_limit: 256
    read_only: true
    security_opt: ["no-new-privileges:true"]
    tmpfs: ["/tmp:rw,noexec,nosuid,size=128m"]

  proxy:
    volumes:
      - ./deploy/nginx.canary.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      api-canary:
        condition: service_healthy
      frontend:
        condition: service_started
